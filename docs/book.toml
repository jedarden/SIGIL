[book]
title = "SIGIL Documentation"
authors = ["SIGIL Contributors"]
description = "Secret Injection, Guarding, and Isolation Layer for AI Coding Agents"
language = "en"
multilingual = false
src = "."

[build]
build-dir = "book"
create-missing = false

[preprocessor.index]

[preprocessor.links]

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
smart-punctuation = true
mathjax-support = false
copy-fonts = true
no-section-label = false
git-repository-url = "https://github.com/jedarden/sigil"
edit-url-template = "https://github.com/jedarden/sigil/edit/main/docs/{path}"

[output.html.search]
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
boost-paragraph = 1
expand = true
heading-split-level = 2

[output.html.redirect]
"/faq.html" = "faq.html"
