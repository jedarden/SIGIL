name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: sigil
            asset_name: sigil-x86_64-linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact_name: sigil
            asset_name: sigil-aarch64-linux
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: sigil
            asset_name: sigil-x86_64-macos
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: sigil
            asset_name: sigil-aarch64-macos
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.os == 'ubuntu-latest' && matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/sigil || true

      - name: Create tarball
        run: |
          cd target/${{ matrix.target }}/release
          tar czf sigil-${{ matrix.asset_name }}.tar.gz sigil
          sha256sum sigil-${{ matrix.asset_name }}.tar.gz > sigil-${{ matrix.asset_name }}.tar.gz.sha256

      - name: Upload tarball
        uses: actions/upload-artifact@v4
        with:
          name: sigil-${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/sigil-${{ matrix.asset_name }}.tar.gz*

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Generate checksums
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec sha256sum {} \; > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/SHA256SUMS
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
